# general
gpu_id: 0
use_gpu: True
seed: [999]

# multi-modal raw features
data_path: '../data/'
save_path: '../src/saved/'

inter_splitting_label: 'x_label'
filter_out_cod_start_users: True
is_multimodal_model: True

checkpoint_dir: 'saved'
save_recommended_topk: True
recommend_topk: 'recommend_topk/'
embedding_size: 64
weight_decay: 0.0 
req_training: True

# training settings
epochs: 1000
stopping_step: 20
train_batch_size: 2048
learner: adam
learning_rate: 0.001
learning_rate_scheduler: [1.0, 50]
eval_step: 1

training_neg_sample_num: 1
use_neg_sampling: True
use_full_sampling: False
NEG_PREFIX: neg__

USER_ID_FIELD: userID
ITEM_ID_FIELD: itemID
TIME_FIELD: timestamp
RATING_FIELD: rating
field_separator: "\t"

# data evaluation process
use_rating: True  
rating_weight: 0 
popularity_weight: 0 
normalize_ratings: True  
min_rating: 1.0  
max_rating: 5.0  

# evaluation settings
metrics: ["Recall", "NDCG", "Precision", "MAP"]
topk: [5, 10, 20, 50]
valid_metric: Recall@20
eval_batch_size: 4096

#
use_raw_features: False
max_txt_len: 32
max_img_size: 256
vocab_size: 30522
type_vocab_size: 2
hidden_size: 4
pad_token_id: 0
max_position_embeddings: 512
layer_norm_eps: 1e-12
hidden_dropout_prob: 0.1

end2end: False

# iteration parameters
# hyper_parameters: ["seed", "vt_loss", "um_loss"]
hyper_parameters: ["seed"]
# ui_rate: [0,0.05,0.1,0.15,0.2]
